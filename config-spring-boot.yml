command-time-out: 360000
code-constructors-instrumentation-path: "/home/commun/infom125/sentinel-group/sentinel-experiments/src/main/java/be/unamur/snail/spoon/constructor_instrumentation"
project:
  name: "spring-boot"
  owner: "spring-projects"
  sub-project: "spring-boot-project/spring-boot"
  show-project-logs: true
  package-prefix: "org.springframework"
repo:
  url: "https://github.com/spring-projects/spring-boot"
  commit: "3ed1f1a064a10e53adc2ad8c0b46a4b2c148ee21"
  # ATTENTION de ne pas supprimer le dossier joularjx-results en instrumentant
  # un projet qui a été analysé auparavant => spécifier 2 target-dir différents
  # pour l'instrumentation et les mesures
  target-dir: "/home/commun/infom125/sentinel-group/test-repositories/spring-boot"
  jdk: "17.0.17-tem"
  overwrite-clone: true
  overwrite-copy: true
environment:
  sdkman-init: "/etc/profile.d/sdkman.sh"
log:
  level: INFO
  directory: "/home/commun/infom125/sentinel-group/sentinel-experiments/logs/spring-boot/"
  also-log-to-console: true
  clear-previous-logs: true
execution-plan:
  test-command: "./gradlew clean spring-boot-project:spring-boot:test --rerun-tasks"
  ignore-failures: false
  ignore-spoon-failures: true
  num-test-runs: 2
  energy-measurements:
    warmup-duration-seconds: 300
    sleep-duration-seconds: 60
    tool: "joularjx"
    tool-version: "3.0.1"
    release-url: "https://github.com/joular/joularjx"
    tool-path: "/home/commun/infom125/sentinel-group/joularjx"
    import-config:
      scopes: ["app"]
      measurement-types: ["runtime", "total"]
      monitoring-types: ["calltrees", "methods"]
backend:
  mode: dev
  server-host: localhost
  server-port: 8080
  server-timeout-seconds: 240
  server-log-path: "/tmp/sentinel-backend.log"
  server-ready-path: "/tmp/backend-ready"
  endpoint: "/api/v2/constructor-contexts"
  # dev-specific
  server-path: "/home/commun/infom125/sentinel-group/sentinel-backend/"
  nb-check-server-start: 20
  # prod-specific
  ssh-user: "jmaquoi"
  ssh-host: "ava.info.unamur.be"