command-time-out: 360000
code-constructors-instrumentation-path: "/home/commun/infom125/sentinel-group/sentinel-experiments/src/main/java/be/unamur/snail/spoon/constructor_instrumentation"
project:
  name: "univocity-parsers"
  owner: "uniVocity"
  sub-project: ""
  show-project-logs: true
  package-prefix: "com.univocity.parsers"
repo:
  url: "https://github.com/uniVocity/univocity-parsers"
  commit: "7e7d1b3c0a3dceaed4a8413875eb1500f2a028ec"
  # ATTENTION de ne pas supprimer le dossier joularjx-results en instrumentant
  # un projet qui a été analysé auparavant => spécifier 2 target-dir différents
  # pour l'instrumentation et les mesures
  target-dir: "/home/commun/infom125/sentinel-group/test-repositories/univocity-parsers"
  jdk: "17.0.18-tem"
  overwrite-clone: true
  overwrite-copy: true
log:
  level: INFO
  directory: "/home/commun/infom125/sentinel-group/sentinel-experiments/logs/univocity-parsers/"
  also-log-to-console: true
  clear-previous-logs: true
execution-plan:
  test-command: "mvn test --errors --show-version --batch-mode --no-transfer-progress -Ddoclint=all -Drat.skip=true"
  ignore-failures: false
  ignore-spoon-failures: true
  num-test-runs: 2
  energy-measurements:
    tool: "joularjx"
    tool-version: "3.0.1"
    release-url: "https://github.com/joular/joularjx"
    tool-path: "/home/commun/infom125/sentinel-group/joularjx"
    import-config:
      scopes: ["app"]
      measurement-types: ["runtime", "total"]
      monitoring-types: ["calltrees", "methods"]
backend:
  mode: dev
  server-host: localhost
  server-port: 8080
  server-timeout-seconds: 240
  server-log-path: "/tmp/sentinel-backend.log"
  server-ready-path: "/tmp/backend-ready"
  endpoint: "/api/v2/constructor-contexts"
